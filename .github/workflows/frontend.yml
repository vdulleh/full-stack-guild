name: Deploy frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy-frontend-s3.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FRONTEND_DIR: frontend
  INFRA_DIR: infra
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    name: Provision infrastructure and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate frontend files
        run: |
          test -n "$AWS_REGION"
          test -f "$FRONTEND_DIR/index.html"
          test -f "$FRONTEND_DIR/app.js"
          test -f "$FRONTEND_DIR/styles.css"

      - name: Install CDK dependencies
        run: |
          npm ci
        working-directory: ${{ env.INFRA_DIR }}

      - name: Deploy S3 website infrastructure
        run: |
          npx cdk deploy --require-approval never --outputs-file cdk-outputs.json
        working-directory: ${{ env.INFRA_DIR }}

      - name: Read infrastructure outputs
        run: |
          node -e "const fs = require('fs'); const outputs = JSON.parse(fs.readFileSync('cdk-outputs.json', 'utf8')); const stack = outputs.FullStackLearningFrontendStack; fs.appendFileSync(process.env.GITHUB_ENV, 'S3_BUCKET=' + stack.FrontendBucketName + '\nWEBSITE_URL=' + stack.FrontendWebsiteUrl + '\n');"
        working-directory: ${{ env.INFRA_DIR }}

      - name: Upload frontend assets
        run: |
          aws s3 sync "$FRONTEND_DIR" "s3://$S3_BUCKET" \
            --delete \
            --exclude ".DS_Store" \
            --cache-control "public, max-age=300"

      - name: Print website URL
        run: |
          echo "Frontend deployed to:"
          echo "$WEBSITE_URL"
