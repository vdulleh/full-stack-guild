name: Deploy Frontend to S3

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_CDK_STACK_NAME: ${{ vars.AWS_CDK_STACK_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify frontend files exist
        run: |
          test -f frontend/index.html
          test -f frontend/styles.css
          test -f frontend/app.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve deployment targets
        run: |
          STACK_NAME="${AWS_CDK_STACK_NAME:-FullStackGuildFrontendStack}"
          RESOLVED_BUCKET="$AWS_S3_BUCKET"
          RESOLVED_DISTRIBUTION_ID="$AWS_CLOUDFRONT_DISTRIBUTION_ID"

          if [ -z "$RESOLVED_BUCKET" ] || [ -z "$RESOLVED_DISTRIBUTION_ID" ]; then
            STACK_OUTPUTS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query "Stacks[0].Outputs" --output json)
          fi

          if [ -z "$RESOLVED_BUCKET" ]; then
            RESOLVED_BUCKET=$(echo "$STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendBucketName") | .OutputValue')
          fi

          if [ -z "$RESOLVED_DISTRIBUTION_ID" ]; then
            RESOLVED_DISTRIBUTION_ID=$(echo "$STACK_OUTPUTS" | jq -r '.[] | select(.OutputKey=="FrontendDistributionId") | .OutputValue')
          fi

          if [ -z "$RESOLVED_BUCKET" ] || [ "$RESOLVED_BUCKET" = "null" ]; then
            echo "Unable to resolve AWS_S3_BUCKET. Set the AWS_S3_BUCKET secret or deploy the CDK stack and expose FrontendBucketName."
            exit 1
          fi

          echo "AWS_S3_BUCKET=$RESOLVED_BUCKET" >> "$GITHUB_ENV"

          if [ -n "$RESOLVED_DISTRIBUTION_ID" ] && [ "$RESOLVED_DISTRIBUTION_ID" != "null" ]; then
            echo "AWS_CLOUDFRONT_DISTRIBUTION_ID=$RESOLVED_DISTRIBUTION_ID" >> "$GITHUB_ENV"
          fi

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://$AWS_S3_BUCKET --delete

      - name: Invalidate CloudFront cache
        if: ${{ env.AWS_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $AWS_CLOUDFRONT_DISTRIBUTION_ID \
            --paths "/*"
